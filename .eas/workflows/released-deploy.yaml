name: Released deploy

on:
  push:
    branches:
      - main

jobs:
  check_release:
    name: Check isReleased flag
    outputs:
      is_released: ${{ steps.check.outputs.is_released }}
      app_version: ${{ steps.check.outputs.app_version }}
      runtime_version: ${{ steps.check.outputs.runtime_version }}
    steps:
      - uses: eas/checkout
      - id: check
        name: Read app.json
        run: |
          IS_RELEASED=$(jq -r '.expo.extra.isReleased' app.json)
          APP_VERSION=$(jq -r '.expo.version' app.json)
          MAJOR_MINOR=$(echo "$APP_VERSION" | cut -d. -f1-2)
          RUNTIME_VERSION="${MAJOR_MINOR}.0"
          set-output is_released "$IS_RELEASED"
          set-output app_version "$APP_VERSION"
          set-output runtime_version "$RUNTIME_VERSION"

  fingerprint:
    name: Fingerprint
    needs: [check_release]
    if: ${{ needs.check_release.outputs.is_released == 'true' }}
    type: fingerprint
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}

  get_ios_build:
    name: Find iOS build
    needs: [check_release, fingerprint]
    type: get-build
    params:
      platform: ios
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      runtime_version: ${{ needs.check_release.outputs.runtime_version }}
      profile: production

  verify_build:
    name: Verify build exists
    needs: [check_release, get_ios_build]
    steps:
      - name: Check build matches runtime
        run: |
          BUILD_ID="${{ needs.get_ios_build.outputs.build_id }}"
          RUNTIME="${{ needs.check_release.outputs.runtime_version }}"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "undefined" ]; then
            echo "No iOS build found matching fingerprint and runtime version $RUNTIME"
            echo "Native code may have changed — set isReleased to false and run pre-release-deploy first."
            exit 1
          fi
          echo "iOS build found: $BUILD_ID"

  get_ios_simulator_build:
    name: Find iOS simulator build
    needs: [fingerprint]
    type: get-build
    params:
      platform: ios
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: production-simulator

  build_ios_simulator:
    name: Build iOS simulator
    needs: [check_release, get_ios_simulator_build]
    if: ${{ !needs.get_ios_simulator_build.outputs.build_id }}
    type: build
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    params:
      platform: ios
      profile: production-simulator

  smoke_test:
    name: Smoke test
    needs: [verify_build]
    after: [get_ios_simulator_build, build_ios_simulator]
    type: maestro
    params:
      build_id: ${{ needs.build_ios_simulator.outputs.build_id || needs.get_ios_simulator_build.outputs.build_id }}
      flow_path: maestro/smoke-test.yaml

  resolve_version:
    name: Resolve update version
    needs: [check_release, smoke_test]
    outputs:
      next_version: ${{ steps.compute.outputs.next_version }}
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - id: compute
        name: Resolve next patch version
        run: |
          MAJOR_MINOR=$(echo "$APP_VERSION" | cut -d. -f1-2)
          echo "Looking for updates matching ${MAJOR_MINOR}.*"
          UPDATE_JSON=$(npx eas-cli update:list --branch production --json --non-interactive 2>/dev/null || echo "")
          echo "Raw messages:"
          echo "$UPDATE_JSON" | jq -r '.currentPage[] | .message' 2>/dev/null || echo "(no updates found)"
          VERSIONS=$(echo "$UPDATE_JSON" | jq -r '[.currentPage[] | .message | match("[0-9]+[.][0-9]+[.][0-9]+") | .string] | unique | .[]' 2>/dev/null || echo "")
          echo "Extracted versions: $VERSIONS"
          LATEST_PATCH=$(echo "$UPDATE_JSON" \
            | jq -r --arg prefix "${MAJOR_MINOR}." '[.currentPage[] | .message | match("[0-9]+[.][0-9]+[.][0-9]+") | .string | select(startswith($prefix))] | map(split(".")[2] | tonumber) | max // 0' 2>/dev/null || echo "0")
          echo "Latest patch: $LATEST_PATCH"
          NEXT_PATCH=$((LATEST_PATCH + 1))
          NEXT_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}"
          echo "Next version: $NEXT_VERSION"
          set-output next_version "$NEXT_VERSION"

  publish_update:
    name: Publish OTA update
    needs: [resolve_version]
    type: update
    env:
      APP_VERSION: ${{ needs.resolve_version.outputs.next_version }}
    params:
      channel: production
      message: ${{ needs.resolve_version.outputs.next_version }}

  skip_update:
    name: Skipped
    needs: [check_release]
    if: ${{ needs.check_release.outputs.is_released == 'false' }}
    type: doc
    params:
      md: |
        # Update skipped

        This app is not yet released (`isReleased: false` in app.json), so no OTA update will be published. Use the **pre-release-deploy** workflow to create builds first.
