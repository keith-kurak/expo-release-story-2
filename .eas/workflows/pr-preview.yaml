name: PR preview

on:
  pull_request:
    branches: ["*"]

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

jobs:
  publish_update:
    name: Publish update
    type: update
    params:
      channel: pr-${{ github.event.pull_request.number }}

  comment:
    name: Post testing instructions
    needs: [publish_update]
    type: github-comment
    params:
      message: |
        ## Testing instructions

        An update has been published to branch `pr-${{ github.event.pull_request.number }}`.

        **Builds:**
        - Android: https://expo.dev/builds/${{ needs.resolve_android_build_id.outputs.build_id }}
        - iOS Simulator: https://expo.dev/builds/${{ needs.resolve_ios_build_id.outputs.build_id }}

        **To test:**
        1. Install the development build on your device or simulator using the links above
        2. Open the app and scan the QR code for the update to load code from branch `pr-${{ github.event.pull_request.number }}`

        **Note: If you have not yet registered your iOS device for development builds, tag this PR with "add-ios-device" and go to the iOS device registration workflow page.**
