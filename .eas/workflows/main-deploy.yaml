name: Continuous Deploy

on:
  push:
    branches:
      - main

jobs:
  check_release:
    name: Check release state
    outputs:
      is_released: ${{ steps.check.outputs.is_released }}
      app_version: ${{ steps.check.outputs.app_version }}
    steps:
      - uses: eas/checkout
      - id: check
        name: Read app.json
        run: |
          IS_RELEASED=$(jq -r '.expo.extra.isReleased' app.json)
          APP_VERSION=$(jq -r '.expo.version' app.json)
          echo "isReleased: $IS_RELEASED, version: $APP_VERSION"
          set-output is_released "$IS_RELEASED"
          set-output app_version "$APP_VERSION"

  fingerprint:
    name: Fingerprint
    needs: [check_release]
    type: fingerprint
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}

  get_android_build:
    name: Check existing Android build
    needs: [fingerprint]
    type: get-build
    params:
      platform: android
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: production

  get_ios_build:
    name: Check existing iOS build
    needs: [fingerprint]
    type: get-build
    params:
      platform: ios
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: production

  # === PRE-RELEASE: build or repack ===

  build_android:
    name: Build Android
    needs: [check_release, get_android_build]
    if: ${{ needs.check_release.outputs.is_released == 'false' && !needs.get_android_build.outputs.build_id }}
    type: build
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS
    needs: [check_release, get_ios_build]
    if: ${{ needs.check_release.outputs.is_released == 'false' && !needs.get_ios_build.outputs.build_id }}
    type: build
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    params:
      platform: ios
      profile: production

  repack_android:
    name: Repack Android
    needs: [check_release, get_android_build]
    if: ${{ needs.check_release.outputs.is_released == 'false' && needs.get_android_build.outputs.build_id }}
    type: repack
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    params:
      build_id: ${{ needs.get_android_build.outputs.build_id }}

  repack_ios:
    name: Repack iOS
    needs: [check_release, get_ios_build]
    if: ${{ needs.check_release.outputs.is_released == 'false' && needs.get_ios_build.outputs.build_id }}
    type: repack
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    params:
      build_id: ${{ needs.get_ios_build.outputs.build_id }}

  submit_android:
    name: Submit Android
    after: [build_android, repack_android]
    if: ${{ needs.build_android.outputs.build_id || needs.repack_android.outputs.build_id }}
    type: doc
    params:
      md: |
        # Submit Android

        Android submission is not yet configured. Once a Google Play service account is set up, this job will submit the Android build to the Play Store.

  submit_ios:
    name: Submit iOS
    after: [build_ios, repack_ios]
    if: ${{ needs.build_ios.outputs.build_id || needs.repack_ios.outputs.build_id }}
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id || needs.repack_ios.outputs.build_id }}

  # === RELEASED: OTA update if runtime matches ===

  resolve_version:
    name: Resolve update version
    needs: [check_release, get_android_build, get_ios_build]
    if: ${{ needs.check_release.outputs.is_released == 'true' && needs.get_android_build.outputs.build_id && needs.get_ios_build.outputs.build_id }}
    outputs:
      next_version: ${{ steps.compute.outputs.next_version }}
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    steps:
      - uses: eas/checkout
      - id: compute
        name: Resolve next patch version
        run: |
          MAJOR_MINOR=$(echo "$APP_VERSION" | cut -d. -f1-2)
          LATEST_PATCH=$(npx eas-cli update:list --branch production --json --non-interactive 2>/dev/null \
            | jq -r "[.currentPage[] | .message | select(startswith(\"${MAJOR_MINOR}.\"))] | map(split(\".\")[2] | tonumber) | max // 0")
          NEXT_PATCH=$((LATEST_PATCH + 1))
          NEXT_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}"
          echo "Next version: $NEXT_VERSION"
          set-output next_version "$NEXT_VERSION"

  publish_update:
    name: Publish OTA update
    needs: [resolve_version]
    type: update
    env:
      APP_VERSION: ${{ needs.resolve_version.outputs.next_version }}
    params:
      channel: production
      message: ${{ needs.resolve_version.outputs.next_version }}

  # === RELEASED + RUNTIME CHANGED: block ===

  block_runtime_change:
    name: Runtime change blocked
    needs: [check_release, get_android_build, get_ios_build]
    if: ${{ needs.check_release.outputs.is_released == 'true' && (!needs.get_android_build.outputs.build_id || !needs.get_ios_build.outputs.build_id) }}
    steps:
      - name: Block deployment
        run: |
          echo "Native runtime changes detected while app is in released state."
          echo "The fingerprint does not match any existing production build."
          echo "Set isReleased to false in app.json to allow native changes."
          exit 1
