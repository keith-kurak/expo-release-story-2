name: Pre-release deploy

on:
  push:
    branches:
      - main

jobs:
  check_release:
    name: Check isReleased flag
    outputs:
      is_released: ${{ steps.check.outputs.is_released }}
      app_version: ${{ steps.check.outputs.app_version }}
      runtime_version: ${{ steps.check.outputs.runtime_version }}
    steps:
      - uses: eas/checkout
      - id: check
        name: Read app.json
        run: |
          IS_RELEASED=$(jq -r '.expo.extra.isReleased' app.json)
          APP_VERSION=$(jq -r '.expo.version' app.json)
          MAJOR_MINOR=$(echo "$APP_VERSION" | cut -d. -f1-2)
          RUNTIME_VERSION="${MAJOR_MINOR}.0"
          set-output is_released "$IS_RELEASED"
          set-output app_version "$APP_VERSION"
          set-output runtime_version "$RUNTIME_VERSION"

  fingerprint:
    name: Fingerprint
    needs: [check_release]
    if: ${{ needs.check_release.outputs.is_released == 'false' }}
    type: fingerprint
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}

  get_ios_build:
    name: Check for existing iOS build
    needs: [check_release, fingerprint]
    type: get-build
    params:
      platform: ios
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      runtime_version: ${{ needs.check_release.outputs.runtime_version }}
      profile: production

  build_ios:
    name: Build iOS
    needs: [get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    params:
      platform: ios
      profile: production

  repack_ios:
    name: Repack iOS
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    type: repack
    env:
      APP_VERSION: ${{ needs.check_release.outputs.app_version }}
    params:
      build_id: ${{ needs.get_ios_build.outputs.build_id }}

  submit_ios:
    name: Submit iOS
    after: [build_ios, repack_ios]
    if: ${{ needs.build_ios.outputs.build_id || needs.repack_ios.outputs.build_id }}
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id || needs.repack_ios.outputs.build_id }}

  skip_build:
    name: Skipped
    needs: [check_release]
    if: ${{ needs.check_release.outputs.is_released == 'true' }}
    type: doc
    params:
      md: |
        # Build skipped

        This app is already released (`isReleased: true` in app.json), so no build is needed. Use the **released-deploy** workflow to publish OTA updates instead.
