name: Production update

on:
  push:
    branches:
      - "release-*.*.0"

jobs:
  check_release:
    name: Check isReleased flag
    outputs:
      is_released: ${{ steps.check.outputs.is_released }}
    steps:
      - uses: eas/checkout
      - id: check
        name: Read isReleased from app.json
        run: |
          IS_RELEASED=$(jq -r '.expo.extra.isReleased' app.json)
          echo "isReleased: $IS_RELEASED"
          set-output is_released "$IS_RELEASED"

  resolve_version:
    name: Resolve update version
    needs: [check_release]
    if: ${{ needs.check_release.outputs.is_released == 'true' }}
    outputs:
      NEXT_VERSION: ${{ steps.compute.outputs.NEXT_VERSION }}
    env:
      APP_VERSION: ${{ substring(github.ref_name, 8) }}
    steps:
      - uses: eas/checkout
      - id: compute
        name: Resolve next patch version
        run: |
          MAJOR_MINOR=$(echo "$APP_VERSION" | cut -d. -f1-2)
          LATEST_PATCH=$(npx eas-cli update:list --branch production --json --non-interactive 2>/dev/null \
            | jq -r "[.currentPage[] | .message | select(startswith(\"${MAJOR_MINOR}.\"))] | map(split(\".\")[2] | tonumber) | max // 0")
          NEXT_PATCH=$((LATEST_PATCH + 1))
          NEXT_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}"
          echo "Next version: $NEXT_VERSION"
          set-output NEXT_VERSION "$NEXT_VERSION"

  publish_update:
    name: Publish OTA update
    needs: [resolve_version]
    env:
      APP_VERSION: ${{ needs.resolve_version.outputs.NEXT_VERSION }}
    steps:
      - uses: eas/checkout
      - name: Publish update to production
        run: |
          npx eas-cli update --channel production --message "${{ needs.resolve_version.outputs.NEXT_VERSION }}" --non-interactive

  skip_update:
    name: Skipped
    needs: [check_release]
    if: ${{ needs.check_release.outputs.is_released == 'false' }}
    type: doc
    params:
      md: |
        # Update skipped

        This app is not yet released (`isReleased: false` in app.json), so no OTA update will be published. Use the **production-build** workflow to create builds first.
